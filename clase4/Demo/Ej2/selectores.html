<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejemplo de Selectores CSS</title>
    <link rel="stylesheet" href="selectores.css">
</head>
<body>
    <div id="contenedor-principal">
        <h1>Título Principal</h1>
        <p class="texto-importante">Este es un párrafo con la clase "texto-importante".</p>
        <p>Este es un párrafo normal.</p>
        <ul id="lista-items">
            <li data-tema="principal">Elemento de lista principal</li>
            <li>Otro elemento de lista</li>
            <li>Un <a href="#">enlace</a> en la lista</li>
        </ul>
        <button type="button">Botón normal</button>
        <button type="submit" disabled>Botón deshabilitado</button>
    </div>
</body>
</html>
